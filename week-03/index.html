<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Week 3 — Coding for the Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      max-width: 70em;
      margin: 0 auto;

<body>

  <h1>Week 3: Control Flow</h1>

  <p>
    Open your browser’s Developer Tools and view the Console.
  </p>

  <p>
    If everything is set up correctly, you should see a message in the Console. aliyah.
  </p>

  <script>
    console.log("welcome to Week 3!");

    var username = "aliyah";

    console.log("My name is " + username);

    //var age = 21;

    var age = prompt("what is your age?");
    console.log(parseInt(age));

    if (typeof parseInt(age) != Number) {
      alert("yo that is not a number!");
    }


    console.log("my age is " + age);
    //console.log(typeof age); //string

    var years = prompt("enter a number of years...");
    //in [years] years, I will be [new age]

    if (typeof parseInt(years) != Number) {
      alert("yo that is not a number!");
    }

    //first add years to age - parseInt to convert string to number
    var newAge = parseInt(age) + parseInt(years);

    console.log("In " + years + " years, you will be " + newAge);
    //console.log(typeof newAge);

    var drinkingAge = 21;
    console.log(typeof drinkingAge);

    var canDrink = newAge >= drinkingAge;
    //console.log(canDrink);
    console.log(typeof canDrink);

    //in [years] years, you [can or can't] legally drink.

    if (canDrink) {
      console.log("If you want to you can.");
    } else {
      console.log("no you can't.");
    }



    //console.log(newAge > drinkingAge);

  </script>
</body>
