    <script>
        var age = prompt("Enter your age?");
        age = parseInt(age);

        var howManyYears = prompt("How many years do you want to see into the future?");
        howManyYears = parseInt(howManyYears);
        // console.log("Your age is " + age);

        //console log how old you'll be in a year
        var sum = age + 1;
        // console.log("In a year, you will be " + sum);

        for (var i = 1; i <= howManyYears; i++) {
            var numYears = i;
            var newAge = parseInt(age + numYears);

            var message = "In "
            message += numYears;
            message += " years, you will be ";
            message += newAge;
            console.log(message);
            //console.log(i);
            //console.log() //in [x] years, you'll be [new age]
        }


        //WHILE LOOPPPPP executes a block of code until its condition is no longer truthy

        var number = 0;

        while (number < 5) {
            alert("number is less than 5");
            number++;//DON'T EVER FORGET THIS !!!
        }
    </script>
